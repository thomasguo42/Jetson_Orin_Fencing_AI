# DKMS config for the WCH ch341 USB-serial driver (CH340, 1a86:7523).
# Installed by deploy/ch341-dkms/setup-dkms.sh into /usr/src/ch341-<ver>/.
# Lets DKMS rebuild ch341.ko automatically when the kernel is upgraded, so the
# MCU serial port survives JetPack kernel updates (see deploy/README.md).
#
# KERNELDIR override points the WCH Makefile at the *target* kernel's headers
# (${kernelver}, set by DKMS) — not `uname -r`, which the Makefile defaults to and
# which would be the running kernel. The var name must match the WCH Makefile
# (it uses KERNELDIR; confirmed in deploy/CH341SER_LINUX/driver/Makefile).
PACKAGE_NAME="ch341"
PACKAGE_VERSION="1.8"
BUILT_MODULE_NAME[0]="ch341"
DEST_MODULE_LOCATION[0]="/updates"
MAKE[0]="make KERNELDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean"
AUTOINSTALL="yes"
