# /run is tmpfs and cleared on every boot, so recreate the UDS parent dir early.
# The AI process creates the socket file inside it. 0770 allows backend and AI
# to use the directory through the shared pistelink service group.
# Install to /etc/tmpfiles.d/pistelink.conf and apply with:
#   systemd-tmpfiles --create /etc/tmpfiles.d/pistelink.conf
d /run/pistelink 0770 root pistelink -
